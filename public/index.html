<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NewAPI Relay Demo</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fa;
      --panel: #ffffff;
      --panel-soft: #f8fafc;
      --text: #1f2328;
      --muted: #667085;
      --line: #d8dee4;
      --primary: #0969da;
      --primary-dark: #0550ae;
      --ok: #1a7f37;
      --warn: #9a6700;
      --danger: #cf222e;
      --code: #24292f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      letter-spacing: 0;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 17px;
      letter-spacing: 0;
    }

    h3 {
      margin: 0 0 10px;
      font-size: 15px;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .status {
      min-width: 260px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .status strong {
      display: block;
      color: var(--ok);
      margin-bottom: 4px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(300px, 360px) minmax(340px, 420px) minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
    }

    .section-body {
      padding: 16px;
    }

    label {
      display: block;
      margin: 13px 0 6px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 11px;
      background: #fff;
      color: var(--text);
      font: inherit;
      outline: none;
    }

    textarea {
      min-height: 118px;
      resize: vertical;
      line-height: 1.55;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.16);
    }

    button {
      min-height: 38px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 0 13px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .primary {
      background: var(--primary);
      color: #fff;
    }

    .primary:hover {
      background: var(--primary-dark);
    }

    .secondary {
      border-color: var(--line);
      background: #fff;
      color: var(--text);
    }

    .danger {
      border-color: #ffebe9;
      background: #fff5f5;
      color: var(--danger);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .hint {
      margin-top: 12px;
      color: var(--warn);
      font-size: 13px;
    }

    .created-key {
      display: none;
      margin-top: 14px;
      padding: 12px;
      border: 1px solid #b6e3c6;
      border-radius: 8px;
      background: #dafbe1;
    }

    .created-key code,
    .code-line code {
      display: block;
      margin-top: 8px;
      padding: 9px;
      border-radius: 6px;
      background: #f6f8fa;
      color: var(--code);
      font: 12px/1.5 Consolas, "SFMono-Regular", monospace;
      word-break: break-all;
    }

    .card-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .key-card,
    .log-row,
    .model-chip {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
    }

    .key-card {
      padding: 11px;
    }

    .key-card header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin: 0 0 6px;
    }

    .key-card strong {
      font-size: 14px;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .response {
      display: grid;
      gap: 14px;
    }

    .answer {
      min-height: 220px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      line-height: 1.75;
      white-space: pre-wrap;
    }

    .answer.loading {
      color: var(--muted);
    }

    .response-meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .metric {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-soft);
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 4px;
    }

    .metric strong {
      font-size: 14px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: #fff;
    }

    .toolbar-actions {
      display: flex;
      gap: 8px;
    }

    .models {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
    }

    .model-chip {
      padding: 7px 10px;
      font-size: 13px;
      cursor: pointer;
    }

    .model-chip:hover {
      border-color: var(--primary);
      color: var(--primary);
    }

    .logs {
      display: grid;
      gap: 8px;
      padding: 14px 16px 16px;
    }

    .log-row {
      display: grid;
      grid-template-columns: 78px minmax(0, 1fr) 64px 72px;
      gap: 8px;
      align-items: center;
      padding: 9px 10px;
      font-size: 13px;
    }

    .log-row .path,
    .log-row .model {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ok {
      color: var(--ok);
      font-weight: 700;
    }

    .bad {
      color: var(--danger);
      font-weight: 700;
    }

    .empty {
      padding: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 1080px) {
      header,
      .grid {
        display: block;
      }

      .status,
      section {
        margin-top: 16px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>NewAPI Relay Demo</h1>
        <p>用你的主上游 API Key 连接真实模型，再给下游创建独立 API Key 调用这个中转站。</p>
      </div>
      <div class="status" id="status">
        <strong>检查中</strong>
        <span>正在读取服务状态</span>
      </div>
    </header>

    <div class="grid">
      <section>
        <div class="section-body">
          <h2>管理 API Key</h2>

          <label for="adminKey">管理员 API Key</label>
          <input id="adminKey" value="your-local-demo-key" autocomplete="off">

          <label for="newKeyName">新 Key 名称</label>
          <input id="newKeyName" value="test-user" autocomplete="off">

          <div class="actions">
            <button class="primary" id="createKey">创建 API Key</button>
            <button class="secondary" id="refreshKeys">刷新列表</button>
          </div>

          <div class="created-key" id="createdKey">
            <strong>新 Key 只显示这一次</strong>
            <code id="createdKeyValue"></code>
          </div>

          <p class="hint">管理员 key 是 .env 里的 LOCAL_API_KEY；下游 key 会保存 hash，不保存明文。</p>
          <div class="card-list" id="keyList"></div>
        </div>
      </section>

      <section>
        <div class="section-body">
          <h2>下游调用测试</h2>

          <label for="clientKey">调用 API Key</label>
          <input id="clientKey" value="your-local-demo-key" autocomplete="off">

          <label for="model">模型</label>
          <select id="model">
            <option value="deepseek-chat">deepseek-chat</option>
          </select>

          <label for="prompt">消息</label>
          <textarea id="prompt">用一句话介绍 API 中转站</textarea>

          <div class="actions">
            <button class="primary" id="send">发送消息</button>
            <button class="secondary" id="loadModels">读取上游模型</button>
          </div>

          <p class="hint">这里的调用 key 可以换成你刚创建的下游 key。</p>
        </div>
      </section>

      <section>
        <div class="toolbar">
          <h2>响应与监控</h2>
          <div class="toolbar-actions">
            <button class="secondary" id="refreshLogs">刷新日志</button>
          </div>
        </div>

        <div class="models" id="modelsOutput">
          <span class="empty">还没有读取模型。</span>
        </div>

        <div class="section-body response">
          <div class="response-meta">
            <div class="metric">
              <span>状态</span>
              <strong id="responseStatus">等待</strong>
            </div>
            <div class="metric">
              <span>模型</span>
              <strong id="responseModel">-</strong>
            </div>
            <div class="metric">
              <span>耗时</span>
              <strong id="responseTime">-</strong>
            </div>
          </div>
          <div class="answer loading" id="answer">发送消息后，这里会展示 assistant 的正文回复。</div>
          <details class="code-line">
            <summary>查看原始响应</summary>
            <code id="rawResponse">{}</code>
          </details>
        </div>

        <div class="toolbar">
          <h3>最近请求摘要</h3>
        </div>
        <div class="logs" id="logsOutput">
          <div class="empty">还没有请求日志。</div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const statusEl = document.querySelector("#status");
    const adminKeyEl = document.querySelector("#adminKey");
    const clientKeyEl = document.querySelector("#clientKey");
    const modelEl = document.querySelector("#model");
    const promptEl = document.querySelector("#prompt");
    const keyListEl = document.querySelector("#keyList");
    const createdKeyEl = document.querySelector("#createdKey");
    const createdKeyValueEl = document.querySelector("#createdKeyValue");
    const modelsOutputEl = document.querySelector("#modelsOutput");
    const logsOutputEl = document.querySelector("#logsOutput");
    const answerEl = document.querySelector("#answer");
    const rawResponseEl = document.querySelector("#rawResponse");
    const responseStatusEl = document.querySelector("#responseStatus");
    const responseModelEl = document.querySelector("#responseModel");
    const responseTimeEl = document.querySelector("#responseTime");

    function adminHeaders() {
      return {
        authorization: "Bearer " + adminKeyEl.value.trim()
      };
    }

    function clientHeaders() {
      return {
        authorization: "Bearer " + clientKeyEl.value.trim()
      };
    }

    async function checkHealth() {
      try {
        const response = await fetch("/health");
        const data = await response.json();
        statusEl.innerHTML =
          "<strong>运行中</strong><span>上游：" +
          escapeHtml(data.upstreamBaseUrl) +
          "<br>下游 Key：" +
          data.downstreamKeys +
          " 个，模型缓存：" +
          data.models +
          " 个</span>";
      } catch (error) {
        statusEl.innerHTML = "<strong style='color:#cf222e'>异常</strong><span>" + escapeHtml(error.message) + "</span>";
      }
    }

    async function createKey() {
      const button = document.querySelector("#createKey");
      button.disabled = true;

      try {
        const response = await fetch("/api/keys", {
          method: "POST",
          headers: {
            "content-type": "application/json",
            ...adminHeaders()
          },
          body: JSON.stringify({
            name: document.querySelector("#newKeyName").value.trim()
          })
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error?.message || "创建失败");
        }

        createdKeyEl.style.display = "block";
        createdKeyValueEl.textContent = data.key;
        clientKeyEl.value = data.key;
        await loadKeys();
        await checkHealth();
      } catch (error) {
        alert(error.message);
      } finally {
        button.disabled = false;
      }
    }

    async function loadKeys() {
      try {
        const response = await fetch("/api/keys", {
          headers: adminHeaders()
        });
        const data = await response.json();
        if (!response.ok) {
          keyListEl.innerHTML = "<div class='empty'>" + escapeHtml(data.error?.message || "读取失败") + "</div>";
          return;
        }
        renderKeys(data.data || []);
      } catch (error) {
        keyListEl.innerHTML = "<div class='empty'>" + escapeHtml(error.message) + "</div>";
      }
    }

    async function disableKey(id) {
      if (!confirm("确定停用这个下游 API Key 吗？")) {
        return;
      }

      const response = await fetch("/api/keys/" + encodeURIComponent(id), {
        method: "DELETE",
        headers: adminHeaders()
      });
      if (!response.ok) {
        const data = await response.json();
        alert(data.error?.message || "停用失败");
      }
      await loadKeys();
      await checkHealth();
    }

    async function loadModels() {
      modelsOutputEl.innerHTML = "<span class='empty'>正在读取上游模型...</span>";

      try {
        const response = await fetch("/v1/models", {
          headers: clientHeaders()
        });
        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.error?.message || "读取模型失败");
        }
        renderModels(data.data || [], data.source);
        await loadLogs();
        await checkHealth();
      } catch (error) {
        modelsOutputEl.innerHTML = "<span class='empty'>" + escapeHtml(error.message) + "</span>";
      }
    }

    async function sendChat() {
      const button = document.querySelector("#send");
      const startedAt = performance.now();
      button.disabled = true;
      answerEl.classList.add("loading");
      answerEl.textContent = "请求中...";
      responseStatusEl.textContent = "请求中";
      responseModelEl.textContent = modelEl.value;
      responseTimeEl.textContent = "-";

      try {
        const response = await fetch("/v1/chat/completions", {
          method: "POST",
          headers: {
            "content-type": "application/json",
            ...clientHeaders()
          },
          body: JSON.stringify({
            model: modelEl.value,
            messages: [
              {
                role: "user",
                content: promptEl.value
              }
            ]
          })
        });

        const text = await response.text();
        const elapsed = Math.round(performance.now() - startedAt);
        let payload = null;
        try {
          payload = JSON.parse(text);
          rawResponseEl.textContent = JSON.stringify(payload, null, 2);
        } catch {
          rawResponseEl.textContent = text;
        }

        responseStatusEl.textContent = String(response.status);
        responseStatusEl.className = response.ok ? "ok" : "bad";
        responseModelEl.textContent = payload?.model || modelEl.value;
        responseTimeEl.textContent = elapsed + " ms";

        const content = payload?.choices?.[0]?.message?.content;
        answerEl.classList.remove("loading");
        answerEl.textContent = content || payload?.error?.message || text || "没有响应正文";

        await loadLogs();
        await checkHealth();
      } catch (error) {
        responseStatusEl.textContent = "失败";
        responseStatusEl.className = "bad";
        answerEl.classList.remove("loading");
        answerEl.textContent = error.message;
      } finally {
        button.disabled = false;
      }
    }

    async function loadLogs() {
      try {
        const response = await fetch("/logs?limit=8", {
          headers: adminHeaders()
        });
        const data = await response.json();
        if (!response.ok) {
          logsOutputEl.innerHTML = "<div class='empty'>" + escapeHtml(data.error?.message || "读取失败") + "</div>";
          return;
        }
        renderLogs(data.data || []);
      } catch (error) {
        logsOutputEl.innerHTML = "<div class='empty'>" + escapeHtml(error.message) + "</div>";
      }
    }

    function renderKeys(keys) {
      if (keys.length === 0) {
        keyListEl.innerHTML = "<div class='empty'>还没有下游 API Key。</div>";
        return;
      }

      keyListEl.innerHTML = keys
        .map((key) => {
          const active = key.active ? "启用" : "停用";
          const lastUsed = key.lastUsedAt ? new Date(key.lastUsedAt).toLocaleString() : "从未使用";
          return (
            "<article class='key-card'><header><strong>" +
            escapeHtml(key.name) +
            "</strong><span class='" +
            (key.active ? "ok" : "bad") +
            "'>" +
            active +
            "</span></header><div class='meta'>" +
            escapeHtml(key.prefix + "..." + key.last4) +
            "<br>请求：" +
            key.requestCount +
            " 次；最近：" +
            escapeHtml(lastUsed) +
            "</div><div class='actions'>" +
            (key.active
              ? "<button class='danger' data-disable='" + escapeHtml(key.id) + "'>停用</button>"
              : "") +
            "</div></article>"
          );
        })
        .join("");

      for (const button of keyListEl.querySelectorAll("[data-disable]")) {
        button.addEventListener("click", () => disableKey(button.dataset.disable));
      }
    }

    function renderModels(models, source) {
      if (models.length === 0) {
        modelsOutputEl.innerHTML = "<span class='empty'>没有读取到模型。</span>";
        return;
      }

      modelsOutputEl.innerHTML = models
        .map(
          (model) =>
            "<button class='model-chip' data-model='" +
            escapeHtml(model.id) +
            "'>" +
            escapeHtml(model.id) +
            "</button>"
        )
        .join("");

      const sourceLabel = document.createElement("span");
      sourceLabel.className = "empty";
      sourceLabel.textContent = source === "upstream" ? "来源：上游 /v1/models" : "来源：本地 fallback";
      modelsOutputEl.appendChild(sourceLabel);

      for (const button of modelsOutputEl.querySelectorAll("[data-model]")) {
        button.addEventListener("click", () => {
          ensureModelOption(button.dataset.model);
          modelEl.value = button.dataset.model;
        });
      }

      ensureModelOptions(models.map((model) => model.id));
    }

    function renderLogs(logs) {
      if (logs.length === 0) {
        logsOutputEl.innerHTML = "<div class='empty'>还没有请求日志。</div>";
        return;
      }

      logsOutputEl.innerHTML = logs
        .map((log) => {
          const ok = Number(log.status) >= 200 && Number(log.status) < 300;
          return (
            "<div class='log-row'><span>" +
            escapeHtml(new Date(log.time).toLocaleTimeString()) +
            "</span><span class='path'>" +
            escapeHtml(log.keyName || "-") +
            " · " +
            escapeHtml(log.path || "") +
            "</span><span class='" +
            (ok ? "ok" : "bad") +
            "'>" +
            escapeHtml(log.status || "-") +
            "</span><span>" +
            escapeHtml(log.durationMs ?? 0) +
            " ms</span><span class='model' style='grid-column: 2 / -1'>" +
            escapeHtml(log.model || log.upstreamModel || log.error || "") +
            "</span></div>"
          );
        })
        .join("");
    }

    function ensureModelOptions(models) {
      for (const model of models) {
        ensureModelOption(model);
      }
    }

    function ensureModelOption(model) {
      if (!model || Array.from(modelEl.options).some((option) => option.value === model)) {
        return;
      }
      const option = document.createElement("option");
      option.value = model;
      option.textContent = model;
      modelEl.appendChild(option);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    document.querySelector("#createKey").addEventListener("click", createKey);
    document.querySelector("#refreshKeys").addEventListener("click", loadKeys);
    document.querySelector("#loadModels").addEventListener("click", loadModels);
    document.querySelector("#send").addEventListener("click", sendChat);
    document.querySelector("#refreshLogs").addEventListener("click", loadLogs);

    checkHealth();
    loadKeys();
    loadModels();
    loadLogs();
  </script>
</body>
</html>
